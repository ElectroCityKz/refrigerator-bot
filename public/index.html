<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Демо от A-tech для Мебель в дом</title>

  <!-- WhatsApp / Open Graph preview -->
  <meta property="og:title" content="Демо от A-tech для Мебель в дом">
  <meta property="og:description" content="AI-консультант по холодильникам. Поможет подобрать идеальный вариант за пару минут.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-container {
      width: 100%;
      max-width: 480px;
      height: 90vh;
      max-height: 700px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: linear-gradient(135deg, #ff6b00, #ff8c38);
      color: #fff;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-header .avatar {
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.25);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .chat-header .info h2 {
      font-size: 16px;
      font-weight: 600;
    }

    .chat-header .info p {
      font-size: 12px;
      opacity: 0.85;
    }

    .chat-header .reset-btn {
      margin-left: auto;
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }

    .chat-header .reset-btn:hover { background: rgba(255,255,255,0.35); }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    .message {
      max-width: 82%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.bot {
      background: #f0f2f5;
      color: #1a1a1a;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.user {
      background: linear-gradient(135deg, #ff6b00, #ff8c38);
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.bot a {
      color: #ff6b00;
      text-decoration: none;
      font-weight: 500;
    }

    .message.bot a:hover { text-decoration: underline; }

    .typing {
      align-self: flex-start;
      padding: 10px 18px;
      background: #f0f2f5;
      border-radius: 16px;
      display: none;
      gap: 5px;
    }

    .typing.visible { display: flex; }

    .typing span {
      width: 8px;
      height: 8px;
      background: #aaa;
      border-radius: 50%;
      animation: bounce 1.4s infinite both;
    }

    .typing span:nth-child(2) { animation-delay: 0.16s; }
    .typing span:nth-child(3) { animation-delay: 0.32s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .chat-input {
      padding: 12px 16px;
      border-top: 1px solid #eee;
      display: flex;
      gap: 8px;
      background: #fff;
    }

    .chat-input input {
      flex: 1;
      border: 1.5px solid #e0e0e0;
      border-radius: 24px;
      padding: 10px 18px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    .chat-input input:focus { border-color: #ff6b00; }

    .chat-input button {
      background: linear-gradient(135deg, #ff6b00, #ff8c38);
      color: #fff;
      border: none;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, opacity 0.15s;
      flex-shrink: 0;
    }

    .chat-input button:hover { transform: scale(1.08); }
    .chat-input button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .quick-actions {
      display: flex;
      gap: 6px;
      padding: 8px 16px 4px;
      overflow-x: auto;
      flex-wrap: wrap;
    }

    .quick-actions button {
      background: #fff3e8;
      color: #ff6b00;
      border: 1px solid #ffe0c2;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    .quick-actions button:hover { background: #ffe0c2; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="avatar">🧊</div>
      <div class="info">
        <h2>Онлайн-консультант A-tech Демо</h2>
        <p>Помогу выбрать холодильник</p>
      </div>
      <button class="reset-btn" onclick="resetChat()">Новый чат</button>
    </div>

    <div class="chat-messages" id="messages">
      <div class="message bot">
        Здравствуйте! Я онлайн-консультант по холодильникам. Помогу подобрать идеальный вариант для вас. Какой бюджет рассматриваете?
      </div>
    </div>

    <div class="quick-actions">
      <button onclick="sendQuick('Что есть до 150 000 ₸?')">До 150 000 ₸</button>
      <button onclick="sendQuick('Нужен с No Frost')">С No Frost</button>
      <button onclick="sendQuick('Самый вместительный?')">Самый большой</button>
      <button onclick="sendQuick('Что посоветуете для семьи?')">Для семьи</button>
      <button onclick="sendQuick('Хочу поговорить с менеджером')">Позвать менеджера</button>
    </div>

    <div class="chat-input">
      <input type="text" id="input" placeholder="Напишите сообщение..." autocomplete="off">
      <button id="sendBtn" onclick="send()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const sessionId = 'sess_' + Math.random().toString(36).slice(2, 10);

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) send();
    });

    function sanitize(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function addMessage(text, isUser) {
      const div = document.createElement('div');
      div.className = `message ${isUser ? 'user' : 'bot'}`;
      const safe = sanitize(text);
      div.innerHTML = safe
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/(https?:\/\/[^\s<)]+)/g, '<a href="$1" target="_blank" rel="noopener">Подробнее</a>')
        .replace(/\n/g, '<br>');
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping(show) {
      let typing = document.querySelector('.typing');
      if (!typing) {
        typing = document.createElement('div');
        typing.className = 'typing';
        typing.innerHTML = '<span></span><span></span><span></span>';
        messagesEl.appendChild(typing);
      }
      typing.classList.toggle('visible', show);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = '';
      sendBtn.disabled = true;
      addMessage(text, true);
      showTyping(true);

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, sessionId }),
        });
        const data = await res.json();
        showTyping(false);
        addMessage(data.reply || data.error, false);
      } catch {
        showTyping(false);
        addMessage('Ошибка соединения. Попробуйте позже.', false);
      }
      sendBtn.disabled = false;
      inputEl.focus();
    }

    function sendQuick(text) {
      inputEl.value = text;
      send();
    }

    async function resetChat() {
      await fetch('/api/reset', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId }),
      });
      messagesEl.innerHTML = '';
      addMessage('Здравствуйте! Я онлайн-консультант по холодильникам. Помогу подобрать идеальный вариант для вас. Какой бюджет рассматриваете?', false);
    }
  </script>
</body>
</html>
